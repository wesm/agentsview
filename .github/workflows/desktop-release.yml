name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Desktop Build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: "24"

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Prepare sidecar
        run: npm run prepare-sidecar
        working-directory: desktop

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASS="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Write API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          KEY_DIR="$RUNNER_TEMP/apple-keys"
          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode \
            > "$KEY_DIR/AuthKey_${APPLE_API_KEY}.p8"
          echo "APPLE_API_KEY_PATH=$KEY_DIR/AuthKey_${APPLE_API_KEY}.p8" \
            >> "$GITHUB_ENV"

      - name: Build DMG and updater bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AGENTSVIEW_UPDATER_PUBKEY: ${{ secrets.AGENTSVIEW_UPDATER_PUBKEY }}
        run: npx tauri build --bundles dmg,updater
        working-directory: desktop

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: agentsview-desktop-macos
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Cleanup signing secrets
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf "$RUNNER_TEMP/apple-keys" 2>/dev/null || true

  build-windows:
    name: Desktop Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: "24"

      - name: Setup MinGW
        uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda  # v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Prepare sidecar
        shell: bash
        run: npm run prepare-sidecar
        working-directory: desktop

      - name: Build NSIS installer and updater bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AGENTSVIEW_UPDATER_PUBKEY: ${{ secrets.AGENTSVIEW_UPDATER_PUBKEY }}
        run: npx tauri build --bundles nsis,updater
        working-directory: desktop

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: agentsview-desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  release:
    name: Upload Desktop Installers
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          path: artifacts
          pattern: agentsview-desktop-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.dmg *.exe *.tar.gz *.nsis.zip > SHA256SUMS-desktop 2>/dev/null || true
          cat SHA256SUMS-desktop

      - name: Generate updater manifest
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          MACOS_SIG=""
          MACOS_URL=""
          WINDOWS_SIG=""
          WINDOWS_URL=""

          for f in artifacts/*.app.tar.gz.sig; do
            if [ -f "$f" ]; then
              MACOS_SIG="$(cat "$f")"
              MACOS_TARBALL="$(basename "${f%.sig}")"
              MACOS_URL="https://github.com/wesm/agentsview/releases/download/${TAG}/${MACOS_TARBALL}"
            fi
          done

          for f in artifacts/*.nsis.zip.sig; do
            if [ -f "$f" ]; then
              WINDOWS_SIG="$(cat "$f")"
              NSIS_ZIP="$(basename "${f%.sig}")"
              WINDOWS_URL="https://github.com/wesm/agentsview/releases/download/${TAG}/${NSIS_ZIP}"
            fi
          done

          if [ -z "$MACOS_SIG" ] || [ -z "$MACOS_URL" ]; then
            echo "error: missing macOS updater signature or URL" >&2
            exit 1
          fi
          if [ -z "$WINDOWS_SIG" ] || [ -z "$WINDOWS_URL" ]; then
            echo "error: missing Windows updater signature or URL" >&2
            exit 1
          fi

          cat > artifacts/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${MACOS_URL}",
                "signature": "${MACOS_SIG}"
              },
              "windows-x86_64": {
                "url": "${WINDOWS_URL}",
                "signature": "${WINDOWS_SIG}"
              }
            }
          }
          MANIFEST

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.app.tar.gz
            artifacts/*.app.tar.gz.sig
            artifacts/*.nsis.zip
            artifacts/*.nsis.zip.sig
            artifacts/latest.json
            artifacts/SHA256SUMS-desktop
